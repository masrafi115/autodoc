name: Dynamic Multi-Lang Doc Generator

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Select the programming language/tool'
        required: true
        type: choice
        options:
          - php
          - python
          - dart
        default: 'php'
      package_name:
        description: 'Package Name (e.g., monolog/monolog, requests, path)'
        required: true
        type: string
        default: 'monolog/monolog'
      package_version:
        description: 'Version/Constraint (e.g., dev-main, 2.31.0, latest)'
        required: true
        type: string
        default: 'latest'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Builder Repo
      uses: actions/checkout@v4

    # ==========================================
    # PHP (phpDocumentor) SETUP & BUILD
    # ==========================================
    - name: Setup PHP
      if: ${{ github.event.inputs.language == 'php' }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: phpdoc
        coverage: none

    - name: Download & Build PHP Docs
      if: ${{ github.event.inputs.language == 'php' }}
      run: |
        mkdir target-package && cd target-package
        composer init --name="doc/builder" --no-interaction
        VERSION="${{ github.event.inputs.package_version }}"
        # Default fallback if 'latest' is kept for PHP
        if [ "$VERSION" = "latest" ]; then VERSION="*"; fi
        composer require "${{ github.event.inputs.package_name }}:$VERSION" --no-interaction
        cd ..
        phpdoc \
          -d "./target-package/vendor/${{ github.event.inputs.package_name }}" \
          -t "./output-docs" \
          --ignore "*/vendor/*,*/tests/*,*/Tests/*" \
          --title="${{ github.event.inputs.package_name }} API Docs"

    # ==========================================
    # PYTHON (Sphinx) SETUP & BUILD
    # ==========================================
    - name: Setup Python
      if: ${{ github.event.inputs.language == 'python' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download & Build Python Docs
      if: ${{ github.event.inputs.language == 'python' }}
      run: |
        pip install sphinx sphinx-rtd-theme
        
        # Install target package
        if [ "${{ github.event.inputs.package_version }}" = "latest" ]; then
          pip install "${{ github.event.inputs.package_name }}"
        else
          pip install "${{ github.event.inputs.package_name }}==${{ github.event.inputs.package_version }}"
        fi
        
        # Auto-generate Sphinx configuration and API stubs
        sphinx-apidoc -F -o ./sphinx-source $(python -c "import ${{ github.event.inputs.package_name }} as m; print(m.__path__[0])")
        
        # Force HTML theme to ReadTheDocs for a clean look
        echo "html_theme = 'sphinx_rtd_theme'" >> ./sphinx-source/conf.py
        
        # Compile to HTML
        sphinx-build -b html ./sphinx-source ./output-docs

    # ==========================================
    # DART (dartdoc) SETUP & BUILD
    # ==========================================
   # ==========================================
# ==========================================
    # DART (dartdoc) SETUP & BUILD
    # ==========================================
    - name: Setup Dart
      if: ${{ github.event.inputs.language == 'dart' }}
      uses: dart-lang/setup-dart@v1

    - name: Download & Build Dart Docs
      if: ${{ github.event.inputs.language == 'dart' }}
      run: |
        # 1. Activate dartdoc globally
        dart pub global activate dartdoc
        
        # 2. Setup version constraint
        VERSION="${{ github.event.inputs.package_version }}"
        if [ "$VERSION" = "latest" ]; then VERSION="any"; fi
        
        # 3. Clean up the package name if someone passes 'username/package'
        RAW_NAME="${{ github.event.inputs.package_name }}"
        CLEAN_NAME="${RAW_NAME##*/}"
        echo "Original input: $RAW_NAME -> Cleaned package name: $CLEAN_NAME"
        
        # 4. Create a temporary project workspace to download the package
        mkdir doc-builder && cd doc-builder
        echo "name: doc_builder" > pubspec.yaml
        echo "environment: {sdk: '>=3.0.0 <4.0.0'}" >> pubspec.yaml
        
        # Force dart to download the target package into the local cache
        dart pub add "$CLEAN_NAME:$VERSION"
        
        # 5. Find where pub downloaded it in the system cache
        PKG_CACHE_DIR=$(find $HOME/.pub-cache/hosted/pub.dev/ -maxdepth 1 -type d -name "${CLEAN_NAME}-*")
        echo "Found package cache directory at: $PKG_CACHE_DIR"
        
        # 6. Copy the package out of the system cache to a safe, independent workspace
        cp -R "$PKG_CACHE_DIR" "$GITHUB_WORKSPACE/target-package"
        
        # 7. Step into the safe workspace, pull local dependencies, and run dartdoc
        cd "$GITHUB_WORKSPACE/target-package"
        dart pub get
        dart pub global run dartdoc --output "$GITHUB_WORKSPACE/output-docs"
    # ==========================================
    # DEPLOYMENT (Unified for all languages)
    # ==========================================
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./output-docs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
