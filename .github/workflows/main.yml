name: Dynamic Multi-Lang Doc Generator

on:
  workflow_dispatch:
    inputs:
      language:
        description: 'Select the programming language/tool'
        required: true
        type: choice
        options:
          - php
          - python
          - dart
        default: 'php'
      package_name:
        description: 'Package Name (e.g., monolog/monolog, requests, path)'
        required: true
        type: string
        default: 'monolog/monolog'
      package_version:
        description: 'Version/Constraint (e.g., dev-main, 2.31.0, latest)'
        required: true
        type: string
        default: 'latest'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Builder Repo
      uses: actions/checkout@v4

    # ==========================================
    # PHP (phpDocumentor) SETUP & BUILD
    # ==========================================
    - name: Setup PHP
      if: ${{ github.event.inputs.language == 'php' }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: phpdoc
        coverage: none

    - name: Download & Build PHP Docs
      if: ${{ github.event.inputs.language == 'php' }}
      run: |
        mkdir target-package && cd target-package
        composer init --name="doc/builder" --no-interaction
        VERSION="${{ github.event.inputs.package_version }}"
        # Default fallback if 'latest' is kept for PHP
        if [ "$VERSION" = "latest" ]; then VERSION="*"; fi
        composer require "${{ github.event.inputs.package_name }}:$VERSION" --no-interaction
        cd ..
        phpdoc \
          -d "./target-package/vendor/${{ github.event.inputs.package_name }}" \
          -t "./output-docs" \
          --ignore "*/vendor/*,*/tests/*,*/Tests/*" \
          --title="${{ github.event.inputs.package_name }} API Docs"

    # ==========================================
    # PYTHON (Sphinx) SETUP & BUILD
    # ==========================================
    - name: Setup Python
      if: ${{ github.event.inputs.language == 'python' }}
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Download & Build Python Docs
      if: ${{ github.event.inputs.language == 'python' }}
      run: |
        pip install sphinx sphinx-rtd-theme
        
        # Install target package
        if [ "${{ github.event.inputs.package_version }}" = "latest" ]; then
          pip install "${{ github.event.inputs.package_name }}"
        else
          pip install "${{ github.event.inputs.package_name }}==${{ github.event.inputs.package_version }}"
        fi
        
        # Auto-generate Sphinx configuration and API stubs
        sphinx-apidoc -F -o ./sphinx-source $(python -c "import ${{ github.event.inputs.package_name }} as m; print(m.__path__[0])")
        
        # Force HTML theme to ReadTheDocs for a clean look
        echo "html_theme = 'sphinx_rtd_theme'" >> ./sphinx-source/conf.py
        
        # Compile to HTML
        sphinx-build -b html ./sphinx-source ./output-docs

    # ==========================================
    # DART (dartdoc) SETUP & BUILD
    # ==========================================
   # ==========================================
    # DART (dartdoc) SETUP & BUILD
    # ==========================================
    - name: Setup Dart
      if: ${{ github.event.inputs.language == 'dart' }}
      uses: dart-lang/setup-dart@v1

    - name: Download & Build Dart Docs
      if: ${{ github.event.inputs.language == 'dart' }}
      run: |
        # 1. Activate dartdoc globally
        dart pub global activate dartdoc
        
        # 2. Determine the version to fetch
        VERSION="${{ github.event.inputs.package_version }}"
        
        # If 'latest', fetch the latest version string using curl from the pub.dev API
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -s https://pub.dev/api/packages/${{ github.event.inputs.package_name }} | jq -r '.latest.version')
        fi
        
        echo "Fetching version: $VERSION"
        
        # 3. Download and extract the package archive directly from pub.dev
        mkdir target-package
        curl -L https://pub.dev/packages/${{ github.event.inputs.package_name }}/versions/$VERSION.tar.gz -o package.tar.gz
        tar -xzf package.tar.gz -C ./target-package
        
        # 4. Move into the actual package, resolve dependencies, and document it
        cd target-package
        dart pub get
        
        # Run dartdoc as the root package and output globally
        dart pub global run dartdoc --output "$GITHUB_WORKSPACE/output-docs"
    # ==========================================
    # DEPLOYMENT (Unified for all languages)
    # ==========================================
    - name: Upload Pages Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./output-docs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
